name: Update Matrix Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Fetch data and recalculate prices via Worker
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, re, time

          WORKER_URL = 'https://abapp-calc.donditov.workers.dev/calc'

          def fetch_url(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return r.read().decode('utf-8')

          # ── Курсы валют ──────────────────────────────────────────────────
          vtb_rate = 11.8
          eur_rate = 92.0
          cny_cbr  = 11.5

          try:
              vtb = json.loads(fetch_url('https://raw.githubusercontent.com/abapptech/calculator/main/vtb_rate.json'))
              if vtb.get('cny_sell'): vtb_rate = float(vtb['cny_sell'])
              print(f'VTB: {vtb_rate}')
          except Exception as e:
              print(f'VTB error: {e}')

          try:
              cbr = json.loads(fetch_url('https://www.cbr-xml-daily.ru/daily_json.js'))
              eur_rate = cbr['Valute']['EUR']['Value']
              cny_cbr  = cbr['Valute']['CNY']['Value']
              print(f'EUR: {eur_rate}, CNY CBR: {cny_cbr}')
          except Exception as e:
              print(f'CBR error: {e}')

          # ── Парсинг объёма ────────────────────────────────────────────────
          def parse_cc(s):
              if not s: return 1500
              s = str(s).lower()
              m = re.search(r'(\d+[.,]\d+)', s)
              if m: return round(float(m.group(1).replace(',','.')) * 1000)
              m = re.search(r'\b(\d{3,4})\b', s)
              if m: return int(m.group(1))
              return 1500

          # ── Запрос к Worker ───────────────────────────────────────────────
          def calc_via_worker(p_cny, cc):
              payload = json.dumps({
                  'pCny': p_cny, 'pMax': p_cny,
                  'rVtb': vtb_rate, 'rCbr': cny_cbr, 'rEur': eur_rate,
                  'etype': 'ice', 'age': 'mid',
                  'cc': cc, 'kw': 110, 'emKw': 0,
                  'comm': 11000,
                  'deliveryManual': 4000,
                  'deliveryIncluded': False, 'toBorderOnly': False,
                  'distMan': 0, 'distErl': 0, 'distSui': 0, 'distHor': 0,
              }).encode()
              req = urllib.request.Request(WORKER_URL, data=payload, headers={
                  'Content-Type': 'application/json',
                  'X-Api-Secret': 'abapp-matrix-2026',
                  
              })
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read().decode('utf-8'))

          # ── Google Sheets ─────────────────────────────────────────────────
          SHEET_ID = '1OCAUO9TqknVBZMmyUB9BatgX9m6ydwBXa0TIK_1eGPo'
          text = fetch_url(f'https://docs.google.com/spreadsheets/d/{SHEET_ID}/gviz/tq?tqx=out:json')
          match = re.search(r'google\.visualization\.Query\.setResponse\(([\s\S]*)\)', text)
          gdata = json.loads(match.group(1))
          rows  = gdata['table']['rows']

          records = []
          errors  = 0
          for row in rows:
              if not row or not row.get('c'): continue
              c = row['c']
              def val(i):
                  return str(c[i]['v']).strip() if i<len(c) and c[i] and c[i].get('v') is not None else ''
              def num(i):
                  try: return float(c[i]['v']) if i<len(c) and c[i] and c[i].get('v') is not None else None
                  except: return None

              country, brand = val(1), val(2)
              if not brand or not country: continue
              if 'страна' in country.lower() or 'бренд' in country.lower(): continue

              yuan   = num(12)
              engine = val(4)
              cc     = parse_cc(engine)

              kyakhta = zabaikalsk = ussuriysk = aleksandrov = None

              if yuan and cc:
                  try:
                      res = calc_via_worker(yuan, cc)
                      kyakhta     = res.get('kyakEvac')
                      zabaikalsk  = res.get('zabaikalsk')
                      ussuriysk   = res.get('ussuriysk')
                      aleksandrov = res.get('alexandrov')
                  except Exception as e:
                      errors += 1
                      if errors <= 3: print(f'Worker error for {brand} {val(3)}: {e}')
                      # Fallback из таблицы
                      kyakhta     = num(8)
                      zabaikalsk  = num(9)
                      ussuriysk   = num(10)
                      aleksandrov = num(11)
              else:
                  kyakhta     = num(8)
                  zabaikalsk  = num(9)
                  ussuriysk   = num(10)
                  aleksandrov = num(11)

              records.append({
                  'country': country, 'brand': brand, 'model': val(3),
                  'engine': engine,   'drive': val(5), 'trans': val(6), 'body': val(7),
                  'kyakhta':     kyakhta,
                  'zabaikalsk':  zabaikalsk,
                  'ussuriysk':   ussuriysk,
                  'aleksandrov': aleksandrov,
                  'yuan': yuan,
              })

          print(f'Records: {len(records)}, errors: {errors}, VTB={vtb_rate}, EUR={eur_rate}')

          # ── Вшиваем в index.html ──────────────────────────────────────────
          data_json = json.dumps(records, ensure_ascii=False)
          with open('index.html', 'r', encoding='utf-8') as f: html = f.read()
          new_block = f'const EMBEDDED_DATA = {data_json};\n// __EMBEDDED_DATA_END__'
          if '// __EMBEDDED_DATA_END__' in html:
              html = re.sub(r'const EMBEDDED_DATA = \[[\s\S]*?\];\n// __EMBEDDED_DATA_END__', new_block, html)
          else:
              html = html.replace('const SHEET_ID =', new_block + '\nconst SHEET_ID =')
          with open('index.html', 'w', encoding='utf-8') as f: f.write(html)
          print('Done!')
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update matrix data [skip ci]"
          git push
